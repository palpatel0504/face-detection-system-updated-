{% extends "base.html" %}
{% block title %}Dashboard | Recognition{% endblock %}
{% block content %}
<div class="container py-4">
  <h3 class="text-center mb-4">Live Recognition Log</h3>
  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th>#</th><th>Name</th><th>Date</th><th>Time</th>
        </tr>
      </thead>
      <tbody>
        {% for row in records %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ row.Name }}</td>
          <td>{{ row.Date }}</td>
          <td>{{ row.Time }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <a href="{{ url_for('download_csv') }}" class="btn btn-primary">
    Download CSV
  </a>
</div>
{% endblock %}
