<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Face Recognition{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-custom px-4">
    <a class="navbar-brand" href="{{ url_for('attendance') }}">
      Face Recognition
    </a>

    {% if session.user %}
      <ul class="navbar-nav ms-auto d-flex flex-row align-items-center">
        <li class="nav-item me-3">
          <a class="nav-link" href="{{ url_for('attendance') }}">Home</a>
        </li>
        <li class="nav-item me-3">
          <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
        </li>
        <li class="nav-item me-3">
          <a class="nav-link" href="{{ url_for('admin') }}">User Admin</a>
        </li>
        <li class="nav-item">
          <span class="navbar-text">Welcome, {{ session.user }}</span>
        </li>
        <li class="nav-item ms-3">
          <a class="btn btn-outline-secondary btn-logout" href="{{ url_for('logout') }}">
            Logout
          </a>
        </li>
      </ul>
    {% endif %}
  </nav>

  {% block content %}{% endblock %}

  <!-- only include the script here if you're still using attendance.js,
       otherwise your inline script in attendance.html is enough -->
</body>
</html>
